name: TaskFlow CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes com Pytest e cobertura
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Validar qualidade do código com flake8
        run: |
          flake8 src/ --max-line-length=100

      - name: Resumo dos resultados
        if: always()
        run: |
          echo "====================================="
          echo "  TaskFlow CI Pipeline — Concluído"
          echo "====================================="
